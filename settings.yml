default_thumbnail_mode:
  default: feed
  type: enum
  choices:
    - minimal-grid
    - grid
    - masonry
    - list
    - blog-style
    - feed
    - none

docs_thumbnail_mode:
  default: none
  type: enum
  choices:
    - minimal-grid
    - grid
    - list
    - blog-style
    - feed
    - none

blog_style_categories:
  type: list
  list_type: category
  default: ""

minimal_grid_categories:
  type: list
  list_type: category
  default: ""

grid_categories:
  type: list
  list_type: category
  default: ""

masonry_categories:
  type: list
  list_type: category
  default: ""

list_categories:
  type: list
  list_type: category
  default: ""

blog_style_tags:
  type: list
  list_type: tag
  default: ""

feed_categories:
  type: list
  list_type: category
  default: ""

feed_tags:
  type: list
  list_type: tag
  default: ""

minimal_grid_tags:
  type: list
  list_type: tag
  default: ""

grid_tags:
  type: list
  list_type: tag
  default: ""

masonry_tags:
  type: list
  list_type: tag
  default: ""

list_tags:
  type: list
  list_type: tag
  default: ""

suggested_topics_mode:
  default: ""
  type: enum
  choices:
    - ""
    - minimal-grid
    - grid
    - masonry
    - list
    - blog-style
    - feed
    - none

enable_outside_topic_lists: false

placeholder_icon:
  default: "comments"

mobile_thumbnails:
  default: true

list_thumbnail_size:
  client: true
  default: 200
  type: enum
  choices:
    - 200
    - 400

# 可滑动分类导航设置
show_scrolling_category_nav:
  default: true
  type: bool

scrolling_nav_categories:
  type: list
  list_type: category
  default: ""

scrolling_nav_show_on_mobile:
  default: true
  type: bool

announcement_background_color:
  default: "#e3f2fd"
  type: string
  client: true

hero_carousel_enabled:
  default: false
  type: bool

hero_carousel_interval_seconds:
  default: 6
  type: integer
  client: true

hero_carousel_slides:
  type: objects
  default: []
  client: true
  schema:
    name: slide
    properties:
      image_url:
        type: string
      link_url:
        type: string
      alt_text:
        type: string

hero_carousel_items:
  default: ""
  type: string
  client: true

# 维护模式设置
maintenance_mode_enabled:
  default: false
  type: bool

maintenance_mode_image:
  type: upload
  default: ""

maintenance_mode_title:
  default: "敬请期待"
  type: string
  client: true

maintenance_mode_description:
  default: "我们正在努力开发中，请稍后再来！"
  type: string
  client: true

# 年龄验证设置
age_verification_enabled:
  default: false
  type: bool

age_verification_excluded_paths:
  default: "/verify|/auth/login?return_to=|/auth/sso-error|/auth/"
  type: string
  client: true

age_verification_reject_url:
  default: "https://cdn.ibomy.com/forum/images/age_verify/r18.html"
  type: string
  client: true

age_verification_interval_seconds:
  default: 86400
  type: integer
  client: true

mobile_inline_search_enabled:
  default: true
  type: bool
